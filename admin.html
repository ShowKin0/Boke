<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - Bōkè</title>
<style>
:root {
  --bg: #fff5f7; --primary: #ffb0c0; --secondary: #87ceeb;
  --card-bg: rgba(255,255,255,0.7); --text: #2d2d2d; --text2: #888;
  --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
input, textarea, select, button { font-family: inherit; }

.login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-card {
  background: var(--card-bg); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3);
  box-shadow: var(--shadow); padding: 40px; width: 100%; max-width: 400px;
}
.login-card h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
.login-card .sub { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.login-card input {
  width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.08);
  border-radius: 10px; font-size: 15px; outline: none; margin-bottom: 16px;
  background: rgba(255,255,255,0.5); transition: border 0.3s;
}
.login-card input:focus { border-color: var(--primary); }
.login-card .btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: var(--primary); color: white; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.3s;
}
.login-card .btn:hover { opacity: 0.85; }
.login-card .error { color: #e74c3c; font-size: 14px; text-align: center; margin-top: 12px; display: none; }

.admin-page { display: none; min-height: 100vh; }
.admin-sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 200px;
  background: var(--card-bg); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.3);
  padding: 24px 12px; display: flex; flex-direction: column;
}
.admin-sidebar h2 { font-size: 18px; margin-bottom: 24px; padding: 0 8px; }
.admin-sidebar h2 span { color: var(--primary); }
.admin-nav-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  color: var(--text2); font-size: 14px; transition: all 0.2s;
  border: none; background: none; text-align: left; width: 100%;
  margin-bottom: 2px;
}
.admin-nav-item:hover { background: rgba(255,176,192,0.1); color: var(--text); }
.admin-nav-item.active { background: rgba(255,176,192,0.15); color: var(--primary); font-weight: 600; }
.admin-content {
  margin-left: 200px; padding: 32px; max-width: 1000px;
}
.admin-content h3 { font-size: 22px; margin-bottom: 24px; }
.admin-content h3 span { color: var(--primary); }

.table-wrap {
  background: var(--card-bg); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3);
  box-shadow: var(--shadow); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.04); }
th { font-weight: 600; color: var(--text2); font-size: 13px; background: rgba(255,255,255,0.3); }
td { color: var(--text); }
tr:hover td { background: rgba(255,176,192,0.04); }
.btn-sm {
  padding: 6px 16px; border: none; border-radius: 6px; font-size: 12px;
  cursor: pointer; margin-right: 4px; transition: all 0.2s;
}
.btn-sm:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-sm.edit { background: var(--secondary); color: white; }
.btn-sm.del { background: #e74c3c; color: white; }
.table-empty { text-align: center; padding: 40px; color: var(--text2); }

.form-wrap {
  background: var(--card-bg); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3);
  box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px;
}
.form-wrap h4 { font-size: 16px; margin-bottom: 16px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px; font-size: 14px; outline: none;
  background: rgba(255,255,255,0.5); transition: border 0.3s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-primary {
  padding: 10px 24px; border: none; border-radius: 8px;
  background: var(--primary); color: white; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  padding: 10px 24px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
  background: rgba(255,255,255,0.5); color: var(--text); font-size: 14px; cursor: pointer;
}
.btn-secondary:hover { background: rgba(255,255,255,0.8); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.color-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.color-picker-item label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.color-picker-item input[type="color"] {
  width: 100%; height: 44px; border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px; cursor: pointer; background: none; padding: 2px;
}
.color-preview {
  margin-top: 16px; padding: 20px; border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.06);
}

.upload-zone {
  border: 2px dashed var(--primary); border-radius: 10px;
  padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s;
  background: rgba(255,176,192,0.04); margin-bottom: 12px;
}
.upload-zone:hover { background: rgba(255,176,192,0.08); border-color: var(--secondary); }
.upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone p { font-size: 14px; color: var(--text2); }
.upload-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.upload-preview img, .upload-preview video { max-width: 120px; max-height: 80px; border-radius: 6px; object-fit: cover; }
.toast {
  position: fixed; top: 24px; right: 24px; z-index: 9999;
  padding: 12px 24px; border-radius: 10px; background: var(--card-bg);
  backdrop-filter: blur(20px); box-shadow: var(--shadow);
  font-size: 14px; animation: toastIn 0.3s ease; display: none;
}
.toast.success { border-left: 3px solid #2ecc71; }
.toast.error { border-left: 3px solid #e74c3c; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  .admin-sidebar { width: 60px; padding: 16px 8px; }
  .admin-sidebar h2 { font-size: 0; }
  .admin-sidebar h2::after { content: 'B'; font-size: 20px; }
  .admin-nav-item { font-size: 0; padding: 10px; text-align: center; }
  .admin-content { margin-left: 60px; padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .color-picker-grid { grid-template-columns: 1fr 1fr; }
}
.media-thumbs { display: flex; gap: 4px; flex-wrap: wrap; }
.media-thumbs img, .media-thumbs video { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
.media-thumbs .audio-icon { width: 40px; height: 40px; border-radius: 6px; background: rgba(255,176,192,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== 登录页 ===== -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>🔐 Bōkè</h1>
    <div class="sub">后台管理系统</div>
    <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" id="loginBtn" onclick="login()">登录</button>
    <div class="error" id="loginError">密码错误</div>
  </div>
</div>

<!-- ===== 后台主界面 ===== -->
<div class="admin-page" id="adminPage">
  <div class="admin-sidebar">
    <h2><span>B</span>ōkè</h2>
    <button class="admin-nav-item active" data-tab="articles" onclick="switchTab('articles')">📝 文章</button>
    <button class="admin-nav-item" data-tab="updates" onclick="switchTab('updates')">💬 动态</button>
    <button class="admin-nav-item" data-tab="explores" onclick="switchTab('explores')">🔍 探索</button>
    <button class="admin-nav-item" data-tab="music" onclick="switchTab('music')">🎵 音乐</button>
    <button class="admin-nav-item" data-tab="theme" onclick="switchTab('theme')">🎨 主题</button>
    <div style="flex:1;"></div>
    <button class="admin-nav-item" onclick="logout()" style="color:#e74c3c;">🚪 退出</button>
  </div>

  <div class="admin-content" id="adminContent">
    <!-- 文章管理 -->
    <div class="tab-panel" id="tab-articles">
      <h3><span>📝</span> 文章管理</h3>
      <div class="form-wrap" id="articleForm">
        <h4 id="articleFormTitle">新增文章</h4>
        <input type="hidden" id="articleEditId">
        <div class="form-group"><label>标题</label><input id="articleTitle" placeholder="文章标题"></div>
        <div class="form-row">
          <div class="form-group"><label>封面URL</label><input id="articleCover" placeholder="封面图链接（可选）"></div>
          <div class="form-group"><label>标签（逗号分隔）</label><input id="articleTags" placeholder="前端, CSS, 设计"></div>
        </div>
        <div class="form-group"><label>摘要</label><textarea id="articleSummary" placeholder="文章摘要" rows="2"></textarea></div>
        <div class="form-group"><label>内容 (HTML)</label><textarea id="articleContent" placeholder="文章内容，支持 HTML" rows="4"></textarea></div>
        <div class="form-group">
          <label>多媒体</label>
          <div class="upload-zone" onclick="document.getElementById('articleMediaInput').click()">
            <div class="icon">📎</div><p>点击上传图片/音频/视频</p>
          </div>
          <input type="file" id="articleMediaInput" accept="image/*,audio/*,video/*" style="display:none" multiple
            onchange="handleMediaUpload(this, 'articleMediaDisplay', 'articleMediaList')">
          <div class="upload-preview" id="articleMediaDisplay"></div>
          <input type="hidden" id="articleMediaList" value="[]">
        </div>
        <div class="form-actions">
          <button class="btn-primary" id="articleSubmitBtn" onclick="saveArticle()">发布文章</button>
          <button class="btn-secondary" onclick="cancelArticleEdit()" style="display:none" id="articleCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>标题</th><th>标签</th><th>媒体</th><th>日期</th><th>操作</th></tr></thead><tbody id="articlesTableBody"></tbody></table></div>
    </div>

    <!-- 动态管理 -->
    <div class="tab-panel" id="tab-updates" style="display:none;">
      <h3><span>💬</span> 动态管理</h3>
      <div class="form-wrap" id="updateForm">
        <h4>发布动态</h4>
        <input type="hidden" id="updateEditId">
        <div class="form-group"><label>内容</label><textarea id="updateContent" placeholder="记录生活..." rows="3"></textarea></div>
        <div class="form-group">
          <label>多媒体</label>
          <div class="upload-zone" onclick="document.getElementById('updateMediaInput').click()">
            <div class="icon">📎</div><p>点击上传图片/音频/视频</p>
          </div>
          <input type="file" id="updateMediaInput" accept="image/*,audio/*,video/*" style="display:none" multiple
            onchange="handleMediaUpload(this, 'updateMediaDisplay', 'updateMediaList')">
          <div class="upload-preview" id="updateMediaDisplay"></div>
          <input type="hidden" id="updateMediaList" value="[]">
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveUpdate()">发布动态</button>
          <button class="btn-secondary" onclick="cancelUpdateEdit()" style="display:none" id="updateCancelBtn">取消</button>
        </div>
      </div>
      <div id="updatesList"></div>
    </div>

    <!-- 探索管理 -->
    <div class="tab-panel" id="tab-explores" style="display:none;">
      <h3><span>🔍</span> 探索管理</h3>
      <div class="form-wrap" id="exploreForm">
        <h4 id="exploreFormTitle">新增项目</h4>
        <input type="hidden" id="exploreEditId">
        <div class="form-row">
          <div class="form-group"><label>标题</label><input id="exploreTitle" placeholder="标题"></div>
          <div class="form-group"><label>分类</label>
            <select id="exploreCategory">
              <option value="website">🌐 网站推荐</option>
              <option value="source">📦 源码</option>
              <option value="video">🎬 学习视频</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>链接 URL</label><input id="exploreUrl" placeholder="https://..."></div>
          <div class="form-group"><label>图标 (Emoji)</label><input id="exploreIcon" placeholder="🔗" value="🔗"></div>
        </div>
        <div class="form-group"><label>描述</label><textarea id="exploreDescription" rows="2"></textarea></div>
        <div class="form-group">
          <label>预览媒体（可选）</label>
          <div class="upload-zone" onclick="document.getElementById('exploreMediaInput').click()">
            <div class="icon">📎</div><p>上传封面图片或预览视频</p>
          </div>
          <input type="file" id="exploreMediaInput" accept="image/*,video/*" style="display:none"
            onchange="handleMediaUpload(this, 'exploreMediaDisplay', 'exploreMediaData', true)">
          <div class="upload-preview" id="exploreMediaDisplay"></div>
          <input type="hidden" id="exploreMediaData" value="">
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveExplore()">添加</button>
          <button class="btn-secondary" onclick="cancelExploreEdit()" style="display:none" id="exploreCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>标题</th><th>分类</th><th>媒体</th><th>操作</th></tr></thead><tbody id="exploresTableBody"></tbody></table></div>
    </div>

    <!-- 音乐管理 -->
    <div class="tab-panel" id="tab-music" style="display:none;">
      <h3><span>🎵</span> 音乐管理</h3>
      <div class="form-wrap">
        <h4>新增歌曲</h4>
        <input type="hidden" id="musicEditId">
        <div class="form-row">
          <div class="form-group"><label>歌曲名</label><input id="musicTitle" placeholder="歌名"></div>
          <div class="form-group"><label>艺术家</label><input id="musicArtist" placeholder="艺术家"></div>
        </div>
        <div class="form-group"><label>音频文件</label>
          <div class="upload-zone" onclick="document.getElementById('musicAudioInput').click()">
            <div class="icon">🎵</div><p>点击上传 MP3 音频文件</p>
          </div>
          <input type="file" id="musicAudioInput" accept="audio/*" style="display:none"
            onchange="handleMediaUpload(this, 'musicAudioDisplay', 'musicAudioData', true)">
          <div class="upload-preview" id="musicAudioDisplay"></div>
          <input type="hidden" id="musicAudioData" value="">
        </div>
        <div class="form-group"><label>外链歌单（可选）</label><input id="musicExternalUrl" placeholder="https://music.163.com/..."></div>
        <div class="form-actions">
          <button class="btn-primary" onclick="saveMusic()">添加歌曲</button>
          <button class="btn-secondary" onclick="cancelMusicEdit()" style="display:none" id="musicCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>歌曲</th><th>艺术家</th><th>类型</th><th>操作</th></tr></thead><tbody id="musicTableBody"></tbody></table></div>
    </div>

    <!-- 主题管理 -->
    <div class="tab-panel" id="tab-theme" style="display:none;">
      <h3><span>🎨</span> 主题配色</h3>
      <div class="form-wrap">
        <div class="color-picker-grid">
          <div class="color-picker-item"><label>背景色</label><input type="color" id="themeBg" value="#fff5f7"></div>
          <div class="color-picker-item"><label>强调色（粉）</label><input type="color" id="themePrimary" value="#ffb0c0"></div>
          <div class="color-picker-item"><label>辅助色（蓝）</label><input type="color" id="themeSecondary" value="#87ceeb"></div>
          <div class="color-picker-item"><label>卡片背景</label><input type="color" id="themeCardBg" value="#ffffff"></div>
          <div class="color-picker-item"><label>文字主色</label><input type="color" id="themeText" value="#2d2d2d"></div>
          <div class="color-picker-item"><label>文字次要</label><input type="color" id="themeTextSecondary" value="#888888"></div>
        </div>
        <div class="color-preview" id="themePreview" style="margin-top:16px;background:var(--bg);">
          <p style="color:var(--text);">预览文字 <span style="color:var(--primary);">强调色</span> <span style="color:var(--secondary);">辅助色</span></p>
          <p style="color:var(--text-secondary); font-size:13px;">次要文字颜色</p>
        </div>
        <div class="form-actions" style="margin-top:16px;">
          <button class="btn-primary" onclick="saveTheme()">保存主题</button>
          <button class="btn-secondary" onclick="resetTheme()">重置默认</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 纯 localStorage 存储层 =====
const PASS = 'zhang';
const STORE_KEY = 'boke_data';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || getDefaultStore(); } catch { return getDefaultStore(); }
}
function saveStore(store) { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
function getDefaultStore() {
  return {
    articles: [], updates: [], explores: [], music: [],
    theme: { bgColor: '#fff5f7', primaryColor: '#ffb0c0', secondaryColor: '#87ceeb', cardBg: 'rgba(255,255,255,0.6)', textColor: '#2d2d2d', textSecondary: '#888888' }
  };
}
function genId() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6); }
function now() { return new Date().toISOString(); }

let store = loadStore();
let currentTab = 'articles';

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('zh-CN'); }

// ===== 文件上传（纯前端） =====
async function uploadFile(file) {
  return new Promise((resolve) => {
    const maxBytes = 4 * 1024 * 1024;
    if (file.size > maxBytes) {
      showToast(`文件 ${(file.size/1024/1024).toFixed(1)}MB 超出 4MB 限制`, 'error');
      resolve(null); return;
    }
    const reader = new FileReader();
    reader.onload = (e) => resolve({ url: e.target.result, filename: file.name, size: file.size });
    reader.onerror = () => { showToast('文件读取失败', 'error'); resolve(null); };
    reader.readAsDataURL(file);
  });
}

async function handleMediaUpload(input, displayId, hiddenId, single = false) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  const display = document.getElementById(displayId);
  for (let file of files) {
    const result = await uploadFile(file);
    if (!result) continue;
    const type = file.type.startsWith('audio/') ? 'audio' : file.type.startsWith('video/') ? 'video' : 'image';
    const item = { type, url: result.url, title: file.name };
    if (single) {
      document.getElementById(hiddenId).value = JSON.stringify(item);
      display.innerHTML = type === 'image' ? `<img src="${result.url}">` : type === 'video' ? `<video src="${result.url}"></video>` : '<div class="audio-icon">🎵</div>';
    } else {
      let list = JSON.parse(document.getElementById(hiddenId).value || '[]');
      list.push(item);
      document.getElementById(hiddenId).value = JSON.stringify(list);
      display.innerHTML = list.map(m => m.type === 'image' ? `<img src="${m.url}">` : m.type === 'video' ? `<video src="${m.url}"></video>` : '<div class="audio-icon">🎵</div>').join('');
    }
  }
  input.value = '';
}

// ===== 登录 =====
function login() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) { showToast('请输入密码', 'error'); return; }
  if (pw === PASS) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ===== Tab 切换 =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-nav-item[data-tab]').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(el => el.style.display = el.id === 'tab-' + tab ? 'block' : 'none');
}

// ===== 文章 CRUD =====
let articles = [];
function loadArticles() {
  articles = store.articles || [];
  const tbody = document.getElementById('articlesTableBody');
  if (!articles.length) { tbody.innerHTML = '<tr><td colspan="5" class="table-empty">暂无文章</td></tr>'; return; }
  tbody.innerHTML = articles.map(a => `<tr>
    <td><strong>${escapeHtml(a.title || '无标题')}</strong></td>
    <td>${(a.tags||[]).map(t => `<span style="display:inline-block;padding:1px 8px;background:rgba(135,206,235,0.15);border-radius:4px;font-size:12px;margin:1px;">${t}</span>`).join('')}</td>
    <td>${a.mediaList && a.mediaList.length ? `<div class="media-thumbs">${a.mediaList.map(m => m.type === 'image' ? `<img src="${m.url}">` : m.type === 'video' ? `<video src="${m.url}"></video>` : '<div class="audio-icon">🎵</div>').join('')}</div>` : '-'}</td>
    <td>${formatDate(a.createdAt)}</td>
    <td><button class="btn-sm edit" onclick="editArticle('${a.id}')">编辑</button><button class="btn-sm del" onclick="deleteArticle('${a.id}')">删除</button></td>
  </tr>`).join('');
}
function editArticle(id) {
  const a = articles.find(x => x.id === id); if (!a) return;
  document.getElementById('articleEditId').value = a.id;
  document.getElementById('articleTitle').value = a.title || '';
  document.getElementById('articleCover').value = a.cover || '';
  document.getElementById('articleTags').value = (a.tags || []).join(', ');
  document.getElementById('articleSummary').value = a.summary || '';
  document.getElementById('articleContent').value = a.content || '';
  document.getElementById('articleMediaList').value = JSON.stringify(a.mediaList || []);
  document.getElementById('articleMediaDisplay').innerHTML = (a.mediaList || []).map(m => m.type === 'image' ? `<img src="${m.url}">` : m.type === 'video' ? `<video src="${m.url}"></video>` : '<div class="audio-icon">🎵</div>').join('');
  document.getElementById('articleFormTitle').textContent = '编辑文章';
  document.getElementById('articleSubmitBtn').textContent = '保存修改';
  document.getElementById('articleCancelBtn').style.display = 'inline-block';
}
function cancelArticleEdit() {
  ['articleEditId','articleTitle','articleCover','articleTags','articleSummary','articleContent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('articleMediaList').value = '[]';
  document.getElementById('articleMediaDisplay').innerHTML = '';
  document.getElementById('articleFormTitle').textContent = '新增文章';
  document.getElementById('articleSubmitBtn').textContent = '发布文章';
  document.getElementById('articleCancelBtn').style.display = 'none';
}
function saveArticle() {
  const id = document.getElementById('articleEditId').value;
  let mediaList = []; try { mediaList = JSON.parse(document.getElementById('articleMediaList').value || '[]'); } catch {}
  const data = { title: document.getElementById('articleTitle').value.trim() || '无标题', summary: document.getElementById('articleSummary').value.trim(), content: document.getElementById('articleContent').value, cover: document.getElementById('articleCover').value.trim(), tags: document.getElementById('articleTags').value.split(/[,，]/).map(s => s.trim()).filter(Boolean), mediaList };
  if (id) { const idx = articles.findIndex(i => i.id === id); if (idx !== -1) articles[idx] = { ...articles[idx], ...data }; }
  else { articles.unshift({ id: genId(), ...data, createdAt: now() }); }
  store.articles = articles; saveStore(store);
  showToast(id ? '文章已更新' : '文章已发布'); cancelArticleEdit(); loadArticles();
}
function deleteArticle(id) {
  if (!confirm('确定删除？')) return;
  articles = articles.filter(i => i.id !== id);
  store.articles = articles; saveStore(store);
  showToast('已删除'); loadArticles();
}

// ===== 动态 CRUD =====
let updates = [];
function loadUpdates() {
  updates = store.updates || [];
  const container = document.getElementById('updatesList');
  if (!updates.length) { container.innerHTML = '<div class="table-empty">暂无动态</div>'; return; }
  container.innerHTML = updates.map(u => `<div style="background:var(--card-bg);backdrop-filter:blur(20px);border-radius:12px;border:1px solid rgba(255,255,255,0.3);padding:16px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="flex:1;"><p>${escapeHtml(u.content || '(无内容)')}</p>
        ${u.mediaList && u.mediaList.length ? `<div class="media-thumbs" style="margin-top:8px;">${u.mediaList.map(m => m.type === 'image' ? `<img src="${m.url}">` : m.type === 'video' ? `<video src="${m.url}"></video>` : '<div class="audio-icon">🎵</div>').join('')}</div>` : ''}
        <div style="font-size:13px;color:var(--text2);margin-top:6px;">${formatDate(u.createdAt)}</div></div>
      <div><button class="btn-sm edit" onclick="editUpdate('${u.id}')">编辑</button><button class="btn-sm del" onclick="deleteUpdate('${u.id}')">删除</button></div>
    </div></div>`).join('');
}
function editUpdate(id) {
  const u = updates.find(x => x.id === id); if (!u) return;
  document.getElementById('updateEditId').value = u.id;
  document.getElementById('updateContent').value = u.content || '';
  document.getElementById('updateMediaList').value = JSON.stringify(u.mediaList || []);
  document.getElementById('updateMediaDisplay').innerHTML = (u.mediaList || []).map(m => m.type === 'image' ? `<img src="${m.url}">` : m.type === 'video' ? `<video src="${m.url}"></video>` : '<div class="audio-icon">🎵</div>').join('');
  document.getElementById('updateCancelBtn').style.display = 'inline-block';
}
function cancelUpdateEdit() {
  document.getElementById('updateEditId').value = '';
  document.getElementById('updateContent').value = '';
  document.getElementById('updateMediaList').value = '[]';
  document.getElementById('updateMediaDisplay').innerHTML = '';
  document.getElementById('updateCancelBtn').style.display = 'none';
}
function saveUpdate() {
  const id = document.getElementById('updateEditId').value;
  let mediaList = []; try { mediaList = JSON.parse(document.getElementById('updateMediaList').value || '[]'); } catch {}
  const data = { content: document.getElementById('updateContent').value.trim(), mediaList };
  if (id) { const idx = updates.findIndex(i => i.id === id); if (idx !== -1) updates[idx] = { ...updates[idx], ...data }; }
  else { updates.unshift({ id: genId(), ...data, createdAt: now() }); }
  store.updates = updates; saveStore(store);
  showToast(id ? '已更新' : '已发布'); cancelUpdateEdit(); loadUpdates();
}
function deleteUpdate(id) {
  if (!confirm('确定删除？')) return;
  updates = updates.filter(i => i.id !== id);
  store.updates = updates; saveStore(store);
  showToast('已删除'); loadUpdates();
}

// ===== 探索 CRUD =====
let explores = [];
function loadExplores() {
  explores = store.explores || [];
  const tbody = document.getElementById('exploresTableBody');
  const labels = { website: '🌐 网站', source: '📦 源码', video: '🎬 视频' };
  if (!explores.length) { tbody.innerHTML = '<tr><td colspan="4" class="table-empty">暂无项目</td></tr>'; return; }
  tbody.innerHTML = explores.map(e => `<tr><td>${e.icon || '🔗'} ${escapeHtml(e.title || '')}</td><td>${labels[e.category] || e.category}</td><td>${e.previewMedia ? (e.previewMedia.type === 'image' ? '🖼️' : '🎬') : '-'}</td><td><button class="btn-sm edit" onclick="editExplore('${e.id}')">编辑</button><button class="btn-sm del" onclick="deleteExplore('${e.id}')">删除</button></td></tr>`).join('');
}
function editExplore(id) {
  const e = explores.find(x => x.id === id); if (!e) return;
  document.getElementById('exploreEditId').value = e.id;
  document.getElementById('exploreTitle').value = e.title || '';
  document.getElementById('exploreCategory').value = e.category || 'website';
  document.getElementById('exploreUrl').value = e.url || '';
  document.getElementById('exploreIcon').value = e.icon || '🔗';
  document.getElementById('exploreDescription').value = e.description || '';
  document.getElementById('exploreMediaData').value = JSON.stringify(e.previewMedia || '');
  const display = document.getElementById('exploreMediaDisplay');
  if (e.previewMedia) display.innerHTML = e.previewMedia.type === 'image' ? `<img src="${e.previewMedia.url}">` : `<video src="${e.previewMedia.url}"></video>`; else display.innerHTML = '';
  document.getElementById('exploreFormTitle').textContent = '编辑项目';
  document.getElementById('exploreCancelBtn').style.display = 'inline-block';
}
function cancelExploreEdit() {
  ['exploreEditId','exploreTitle','exploreUrl','exploreIcon','exploreDescription'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('exploreCategory').value = 'website';
  document.getElementById('exploreMediaData').value = '';
  document.getElementById('exploreMediaDisplay').innerHTML = '';
  document.getElementById('exploreFormTitle').textContent = '新增项目';
  document.getElementById('exploreCancelBtn').style.display = 'none';
}
function saveExplore() {
  const id = document.getElementById('exploreEditId').value;
  let previewMedia = null;
  const raw = document.getElementById('exploreMediaData').value;
  if (raw) { try { previewMedia = JSON.parse(raw); } catch {} }
  const data = { title: document.getElementById('exploreTitle').value.trim(), category: document.getElementById('exploreCategory').value, url: document.getElementById('exploreUrl').value.trim(), icon: document.getElementById('exploreIcon').value.trim() || '🔗', description: document.getElementById('exploreDescription').value.trim(), previewMedia };
  if (id) { const idx = explores.findIndex(i => i.id === id); if (idx !== -1) explores[idx] = { ...explores[idx], ...data }; }
  else { explores.unshift({ id: genId(), ...data, createdAt: now() }); }
  store.explores = explores; saveStore(store);
  showToast(id ? '已更新' : '已添加'); cancelExploreEdit(); loadExplores();
}
function deleteExplore(id) {
  if (!confirm('确定删除？')) return;
  explores = explores.filter(i => i.id !== id);
  store.explores = explores; saveStore(store);
  showToast('已删除'); loadExplores();
}

// ===== 音乐 CRUD =====
let musicList = [];
function loadMusic() {
  musicList = store.music || [];
  const tbody = document.getElementById('musicTableBody');
  if (!musicList.length) { tbody.innerHTML = '<tr><td colspan="4" class="table-empty">暂无歌曲</td></tr>'; return; }
  tbody.innerHTML = musicList.map(m => `<tr><td>🎵 ${escapeHtml(m.title || '未知')}</td><td>${escapeHtml(m.artist || '未知')}</td><td>${m.type === 'external' ? '📻 外链' : '📁 本地'}</td><td><button class="btn-sm edit" onclick="editMusic('${m.id}')">编辑</button><button class="btn-sm del" onclick="deleteMusic('${m.id}')">删除</button></td></tr>`).join('');
}
function editMusic(id) {
  const m = musicList.find(x => x.id === id); if (!m) return;
  document.getElementById('musicEditId').value = m.id;
  document.getElementById('musicTitle').value = m.title || '';
  document.getElementById('musicArtist').value = m.artist || '';
  document.getElementById('musicExternalUrl').value = m.externalUrl || '';
  document.getElementById('musicAudioData').value = JSON.stringify({ url: m.src, type: 'audio' });
  document.getElementById('musicAudioDisplay').innerHTML = m.src ? '<div class="audio-icon">🎵</div>' : '';
  document.getElementById('musicCancelBtn').style.display = 'inline-block';
}
function cancelMusicEdit() {
  ['musicEditId','musicTitle','musicArtist','musicExternalUrl','musicAudioData'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('musicAudioDisplay').innerHTML = '';
  document.getElementById('musicCancelBtn').style.display = 'none';
}
function saveMusic() {
  const id = document.getElementById('musicEditId').value;
  let src = '';
  const audioData = document.getElementById('musicAudioData').value;
  if (audioData) { try { src = JSON.parse(audioData).url; } catch {} }
  const data = { title: document.getElementById('musicTitle').value.trim() || '未知', artist: document.getElementById('musicArtist').value.trim() || '未知', src: src || '', externalUrl: document.getElementById('musicExternalUrl').value.trim(), type: src ? 'local' : 'external' };
  if (id) { const idx = musicList.findIndex(i => i.id === id); if (idx !== -1) musicList[idx] = { ...musicList[idx], ...data }; }
  else { musicList.unshift({ id: genId(), ...data, createdAt: now() }); }
  store.music = musicList; saveStore(store);
  showToast(id ? '已更新' : '已添加'); cancelMusicEdit(); loadMusic();
}
function deleteMusic(id) {
  if (!confirm('确定删除？')) return;
  musicList = musicList.filter(i => i.id !== id);
  store.music = musicList; saveStore(store);
  showToast('已删除'); loadMusic();
}

// ===== 主题 =====
const DEFAULT_THEME = { bgColor: '#fff5f7', primaryColor: '#ffb0c0', secondaryColor: '#87ceeb', cardBg: 'rgba(255,255,255,0.6)', textColor: '#2d2d2d', textSecondary: '#888888' };
function loadTheme() {
  const t = store.theme || DEFAULT_THEME;
  document.getElementById('themeBg').value = t.bgColor || '#fff5f7';
  document.getElementById('themePrimary').value = t.primaryColor || '#ffb0c0';
  document.getElementById('themeSecondary').value = t.secondaryColor || '#87ceeb';
  document.getElementById('themeCardBg').value = t.cardBg || '#ffffff';
  document.getElementById('themeText').value = t.textColor || '#2d2d2d';
  document.getElementById('themeTextSecondary').value = t.textSecondary || '#888888';
  previewTheme();
}
function previewTheme() {
  const g = id => document.getElementById(id).value;
  const p = document.getElementById('themePreview');
  p.style.background = g('themeBg');
  p.style.setProperty('--text', g('themeText'));
  p.style.setProperty('--primary', g('themePrimary'));
  p.style.setProperty('--secondary', g('themeSecondary'));
  p.style.setProperty('--text-secondary', g('themeTextSecondary'));
}
document.querySelectorAll('#tab-theme input[type="color"]').forEach(el => el.addEventListener('input', previewTheme));
function hexToRgb(hex) { return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16); }
function getThemeData() { return { bgColor: document.getElementById('themeBg').value, primaryColor: document.getElementById('themePrimary').value, secondaryColor: document.getElementById('themeSecondary').value, cardBg: 'rgba('+hexToRgb(document.getElementById('themeCardBg').value)+',0.6)', textColor: document.getElementById('themeText').value, textSecondary: document.getElementById('themeTextSecondary').value }; }
function saveTheme() {
  store.theme = getThemeData(); saveStore(store);
  showToast('主题已保存');
}
function resetTheme() {
  store.theme = { ...DEFAULT_THEME }; saveStore(store);
  loadTheme();
  showToast('已重置为默认主题');
}

// ===== 加载全部 =====
function loadAll() {
  store = loadStore();
  loadArticles(); loadUpdates(); loadExplores(); loadMusic(); loadTheme();
  switchTab('articles');
}
