<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - Bōkè</title>
<link rel="stylesheet" href="style.css">
<style>
:root {
  --bg: #fff5f7; --primary: #ffb0c0; --secondary: #87ceeb;
  --card-bg: rgba(255,255,255,0.7); --text: #2d2d2d; --text2: #888;
  --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, textarea, select, button { font-family: inherit; }
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow); padding: 40px; width: 100%; max-width: 400px; }
.login-card h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
.login-card .sub { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.login-card input { width: 100%; padding: 12px 16px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; font-size: 15px; outline: none; margin-bottom: 16px; background: rgba(255,255,255,0.5); transition: border 0.3s; }
.login-card input:focus { border-color: var(--primary); }
.login-card .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.3s; }
.login-card .btn:hover { opacity: 0.85; }
.login-card .error { color: #e74c3c; font-size: 14px; text-align: center; margin-top: 12px; display: none; }
.admin-page { display: none; min-height: 100vh; }
.admin-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.3); padding: 24px 12px; display: flex; flex-direction: column; }
.admin-sidebar h2 { font-size: 18px; margin-bottom: 24px; padding: 0 8px; }
.admin-sidebar h2 span { color: var(--primary); }
.admin-nav-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 14px; transition: all 0.2s; border: none; background: none; text-align: left; width: 100%; margin-bottom: 2px; }
.admin-nav-item:hover { background: rgba(255,176,192,0.1); color: var(--text); }
.admin-nav-item.active { background: rgba(255,176,192,0.15); color: var(--primary); font-weight: 600; }
.admin-content { margin-left: 200px; padding: 32px; max-width: 1000px; }
.admin-content h3 { font-size: 22px; margin-bottom: 24px; }
.admin-content h3 span { color: var(--primary); }
.table-wrap { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.04); }
th { font-weight: 600; color: var(--text2); font-size: 13px; background: rgba(255,255,255,0.3); }
td { color: var(--text); }
tr:hover td { background: rgba(255,176,192,0.04); }
.btn-sm { padding: 6px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; margin-right: 4px; transition: all 0.2s; }
.btn-sm:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-sm.edit { background: var(--secondary); color: white; }
.btn-sm.del { background: #e74c3c; color: white; }
.table-empty { text-align: center; padding: 40px; color: var(--text2); }
.form-wrap { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.3); box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px; }
.form-wrap h4 { font-size: 16px; margin-bottom: 16px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; font-size: 14px; outline: none; background: rgba(255,255,255,0.5); transition: border 0.3s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-primary { padding: 10px 24px; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { padding: 10px 24px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; background: rgba(255,255,255,0.5); color: var(--text); font-size: 14px; cursor: pointer; }
.color-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.color-picker-item label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.color-picker-item input[type="color"] { width: 100%; height: 44px; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; cursor: pointer; background: none; padding: 2px; }
.color-preview { margin-top: 16px; padding: 20px; border-radius: var(--radius); border: 1px solid rgba(0,0,0,0.06); }
.toast { position: fixed; top: 24px; right: 24px; z-index: 9999; padding: 12px 24px; border-radius: 10px; background: var(--card-bg); backdrop-filter: blur(20px); box-shadow: var(--shadow); font-size: 14px; animation: toastIn 0.3s ease; display: none; }
.toast.success { border-left: 3px solid #2ecc71; }
.toast.error { border-left: 3px solid #e74c3c; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
/* ===== 富文本编辑器 ===== */
.editor-toolbar { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:6px; padding:5px 6px; background:rgba(255,255,255,0.5); border-radius:8px; border:1px solid rgba(0,0,0,0.04); align-items:center; }
.ed-btn { width:30px; height:28px; border:1px solid rgba(0,0,0,0.06); border-radius:5px; background:white; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--text); padding:0; }
.ed-btn:hover { background:var(--primary); color:white; border-color:var(--primary); }
.ed-btn.code-btn { width:auto; padding:0 10px; font-size:12px; }
.ed-divider { width:1px; height:18px; background:rgba(0,0,0,0.08); margin:0 3px; flex-shrink:0; }
.article-editor { min-height:260px; padding:14px 16px; border:1px solid rgba(0,0,0,0.08); border-radius:8px; font-size:15px; line-height:1.8; outline:none; background:rgba(255,255,255,0.5); transition:border 0.3s; cursor:text; overflow-y:auto; white-space:pre-wrap; word-wrap:break-word; }
.article-editor:focus { border-color:var(--primary); }
.article-editor:empty::before { content:attr(data-placeholder); color:#bbb; pointer-events:none; }
.article-editor h2 { font-size:22px; margin:0.6em 0 0.3em; font-weight:700; }
.article-editor h3 { font-size:18px; margin:0.5em 0 0.3em; font-weight:700; }
.article-editor blockquote { margin:0.5em 0; padding:8px 16px; border-left:4px solid var(--primary); background:rgba(255,176,192,0.08); border-radius:0 6px 6px 0; color:var(--text2); }
.article-editor ul, .article-editor ol { padding-left:1.5em; margin:0.4em 0; }
.article-editor pre { background:#282c34; color:#abb2bf; padding:16px; border-radius:8px; overflow-x:auto; font-size:13px; line-height:1.6; margin:0.6em 0; font-family:Consolas,monospace; white-space:pre; }
.article-editor pre code { background:none; padding:0; font-family:inherit; font-size:inherit; color:inherit; }
.article-editor code { background:rgba(198,120,221,0.1); padding:1px 5px; border-radius:3px; font-size:0.9em; color:#c678dd; font-family:Consolas,monospace; }
.article-editor a { color:var(--secondary); text-decoration:underline; }
/* ===== 代码块编辑器弹窗 ===== */
.code-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:5000; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); }
.code-modal-inner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:720px; max-height:80vh; background:#1e1e1e; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; overflow:hidden; }
.code-modal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:#2d2d2d; color:#ccc; font-size:14px; font-weight:600; border-bottom:1px solid #3a3a3a; }
.code-modal-close { width:28px; height:28px; border:none; border-radius:6px; background:transparent; color:#999; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.code-modal-close:hover { background:rgba(255,255,255,0.1); color:#fff; }
.code-modal-body { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.code-lang-bar { padding:8px 16px; background:#252526; border-bottom:1px solid #3a3a3a; }
.code-lang-select { padding:4px 10px; border:1px solid #3a3a3a; border-radius:4px; font-size:12px; background:#1e1e1e; color:#ccc; outline:none; }
.code-lang-select option { background:#1e1e1e; }
.code-editor-atom { flex:1; display:flex; overflow:hidden; position:relative; background:#282c34; }
.code-gutter { width:44px; flex-shrink:0; padding:14px 0; text-align:right; padding-right:10px; font-size:13px; line-height:1.6; color:#5c6370; font-family:Consolas,monospace; user-select:none; overflow:hidden; background:#282c34; }
.code-input-wrap { flex:1; position:relative; overflow:auto; }
.code-input { position:absolute; top:0; left:0; width:100%; height:100%; padding:14px 16px; border:none; background:transparent; color:transparent; caret-color:#fff; font-size:13px; line-height:1.6; font-family:Consolas,monospace; resize:none; outline:none; overflow:auto; white-space:pre; tab-size:4; -webkit-text-fill-color:transparent; z-index:2; }
.code-overlay { position:absolute; top:0; left:0; width:100%; height:100%; padding:14px 16px; margin:0; border:none; background:transparent; color:#abb2bf; font-size:13px; line-height:1.6; font-family:Consolas,monospace; overflow:auto; white-space:pre; tab-size:4; pointer-events:none; z-index:1; }
.code-overlay code { background:none; padding:0; font-family:inherit; font-size:inherit; }
.code-overlay .hl-cmt { color:#5c6370; font-style:italic; }
.code-overlay .hl-str { color:#98c379; }
.code-overlay .hl-kw { color:#c678dd; font-weight:600; }
.code-overlay .hl-num { color:#d19a66; }
.code-overlay .hl-type { color:#e5c07b; }
.code-overlay .hl-builtin { color:#61afef; }
.code-modal-footer { display:flex; gap:8px; justify-content:flex-end; padding:12px 16px; background:#252526; border-top:1px solid #3a3a3a; }
.code-modal-footer .btn-secondary { background:#3a3a3a; color:#ccc; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-size:13px; transition:background 0.2s; }
.code-modal-footer .btn-secondary:hover { background:#4a4a4a; }
.code-modal-footer .btn-primary { background:#c678dd; color:white; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:background 0.2s; }
.code-modal-footer .btn-primary:hover { background:#b368d0; }
@media (max-width: 768px) { .admin-sidebar { width: 60px; padding: 16px 8px; } .admin-sidebar h2 { font-size: 0; } .admin-sidebar h2::after { content: 'B'; font-size: 20px; } .admin-nav-item { font-size: 0; padding: 10px; text-align: center; } .admin-content { margin-left: 60px; padding: 16px; } .form-row { grid-template-columns: 1fr; } .color-picker-grid { grid-template-columns: 1fr 1fr; } .code-modal-inner { width:95%; max-height:90vh; } }
.rich-text { line-height:1.7; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>🔐 Bōkè</h1>
    <div class="sub">后台管理系统</div>
    <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" id="loginBtn" onclick="login()">登录</button>
    <div class="error" id="loginError">密码错误</div>
  </div>
</div>

<div class="admin-page" id="adminPage">
  <div class="admin-sidebar">
    <h2><span>B</span>ōkè</h2>
    <button class="admin-nav-item active" data-tab="articles" onclick="switchTab('articles')">📝 文章</button>
    <button class="admin-nav-item" data-tab="updates" onclick="switchTab('updates')">💬 动态</button>
    <button class="admin-nav-item" data-tab="explores" onclick="switchTab('explores')">🔍 探索</button>
    <button class="admin-nav-item" data-tab="music" onclick="switchTab('music')">🎵 音乐</button>
    <button class="admin-nav-item" data-tab="theme" onclick="switchTab('theme')">🎨 主题</button>
    <div style="flex:1;"></div>
    <button class="admin-nav-item" onclick="exportData()" title="导出数据到 JSON 文件">📤 导出</button>
    <button class="admin-nav-item" onclick="document.getElementById('importFileInput').click()" title="从 JSON 文件导入数据">📥 导入</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importData(this)">
    <button class="admin-nav-item" onclick="logout()" style="color:#e74c3c;">🚪 退出</button>
  </div>

  <div class="admin-content" id="adminContent">
    <!-- 文章管理 -->
    <div class="tab-panel" id="tab-articles">
      <h3><span>📝</span> 文章管理</h3>
      <div class="form-wrap" id="articleForm">
        <h4 id="articleFormTitle">新增文章</h4>
        <input type="hidden" id="articleEditId">
        <div class="form-group"><label>标题</label><input id="articleTitle" placeholder="文章标题"></div>
        <div class="form-row">
          <div class="form-group"><label>摘要</label><textarea id="articleSummary" placeholder="文章摘要" rows="2"></textarea></div>
          <div class="form-group"><label>标签（逗号分隔）</label><input id="articleTags" placeholder="前端, CSS, 设计"></div>
        </div>
        <div class="form-group"><label>内容</label>
          <div id="articleEditorContainer"></div>
          <input type="file" id="imageFileInput" accept="image/*" style="display:none">
        </div>
        <!-- 代码块编辑器弹窗 -->
        <div class="code-modal" id="codeModal">
          <div class="code-modal-inner">
            <div class="code-modal-header">
              <span>编辑代码块</span>
              <button class="code-modal-close" onclick="closeCodeModal()">✕</button>
            </div>
            <div class="code-modal-body">
              <div class="code-lang-bar">
                <select id="codeLangSelect" class="code-lang-select">
                  <option value="">选择语言</option>
                  <option value="javascript">JavaScript</option>
                  <option value="typescript">TypeScript</option>
                  <option value="python">Python</option>
                  <option value="html">HTML</option>
                  <option value="css">CSS</option>
                  <option value="cpp">C++</option>
                  <option value="java">Java</option>
                  <option value="go">Go</option>
                  <option value="rust">Rust</option>
                  <option value="c">C</option>
                  <option value="sql">SQL</option>
                  <option value="bash">Bash</option>
                </select>
              </div>
              <div class="code-editor-atom">
                <div class="code-gutter" id="codeGutter">1</div>
                <div class="code-input-wrap">
                  <textarea id="codeInput" class="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" data-gramm="false" placeholder="在此输入代码..."></textarea>
                  <pre class="code-overlay" id="codeOverlay"><code id="codeOverlayContent"></code></pre>
                </div>
              </div>
            </div>
            <div class="code-modal-footer">
              <button class="btn-secondary" onclick="closeCodeModal()">取消</button>
              <button class="btn-primary" onclick="insertCodeBlock()">插入代码块</button>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" id="articleSubmitBtn" onclick="articles.save()">发布文章</button>
          <button class="btn-secondary" onclick="articles.cancel()" style="display:none" id="articleCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>标题</th><th>标签</th><th>日期</th><th>操作</th></tr></thead><tbody id="articlesTableBody"></tbody></table></div>
    </div>

    <!-- 动态管理 -->
    <div class="tab-panel" id="tab-updates" style="display:none;">
      <h3><span>💬</span> 动态管理</h3>
      <div class="form-wrap" id="updateForm">
        <h4>发布动态</h4>
        <input type="hidden" id="updateEditId">
        <div class="form-group"><label>内容</label><div id="updateEditorContainer"></div></div>
        <div class="form-actions">
          <button class="btn-primary" onclick="updates.save()">发布动态</button>
          <button class="btn-secondary" onclick="updates.cancel()" style="display:none" id="updateCancelBtn">取消</button>
        </div>
      </div>
      <div id="updatesList"></div>
    </div>

    <!-- 探索管理 -->
    <div class="tab-panel" id="tab-explores" style="display:none;">
      <h3><span>🔍</span> 探索管理</h3>
      <div class="form-wrap" id="exploreForm">
        <h4 id="exploreFormTitle">新增项目</h4>
        <input type="hidden" id="exploreEditId">
        <div class="form-row">
          <div class="form-group"><label>标题</label><input id="exploreTitle" placeholder="标题"></div>
          <div class="form-group"><label>分类</label>
            <select id="exploreCategory"><option value="website">🌐 网站推荐</option><option value="source">📦 源码</option><option value="video">🎬 学习视频</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>链接 URL</label><input id="exploreUrl" placeholder="https://..."></div>
          <div class="form-group"><label>图标</label><input id="exploreIcon" placeholder="🔗" value="🔗"></div>
        </div>
        <div class="form-group"><label>描述</label><div id="exploreDescContainer"></div></div>
        <div class="form-actions">
          <button class="btn-primary" onclick="explores.save()">添加</button>
          <button class="btn-secondary" onclick="explores.cancel()" style="display:none" id="exploreCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>标题</th><th>分类</th><th>操作</th></tr></thead><tbody id="exploresTableBody"></tbody></table></div>
    </div>

    <!-- 音乐管理 -->
    <div class="tab-panel" id="tab-music" style="display:none;">
      <h3><span>🎵</span> 音乐管理</h3>
      <div class="form-wrap">
        <h4>新增歌曲</h4>
        <input type="hidden" id="musicEditId">
        <div class="form-row">
          <div class="form-group"><label>歌曲名</label><input id="musicTitle" placeholder="歌名"></div>
          <div class="form-group"><label>歌手</label><input id="musicArtist" placeholder="歌手"></div>
        </div>
        <div class="form-group">
          <label>歌曲文件 / 外链链接</label>
          <div style="display:flex;gap:6px;">
            <input id="musicUrl" placeholder="https://... 或选择本地音频文件" style="flex:1;">
            <button type="button" class="btn-sm edit" onclick="document.getElementById('musicFileInput').click()" style="white-space:nowrap;">📁 选择文件</button>
          </div>
          <input type="file" id="musicFileInput" accept="audio/*" style="display:none">
        </div>
        <div class="form-group">
          <label>封面图片（可选）</label>
          <div style="display:flex;gap:6px;align-items:center;">
            <input id="musicCover" placeholder="封面图片 URL 或选择本地图片" style="flex:1;">
            <button type="button" class="btn-sm edit" onclick="document.getElementById('musicCoverInput').click()">🖼️ 选择</button>
          </div>
          <div id="musicCoverPreview" style="margin-top:6px;width:56px;height:56px;border-radius:12px;overflow:hidden;background:rgba(0,0,0,0.04);display:none;"></div>
          <input type="file" id="musicCoverInput" accept="image/*" style="display:none">
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="music.save()">添加歌曲</button>
          <button class="btn-secondary" onclick="music.cancel()" style="display:none" id="musicCancelBtn">取消</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>歌曲</th><th>歌手</th><th>类型</th><th>操作</th></tr></thead><tbody id="musicTableBody"></tbody></table></div>
    </div>

    <!-- 主题管理 -->
    <div class="tab-panel" id="tab-theme" style="display:none;">
      <h3><span>🎨</span> 主题配色</h3>
      <div class="form-wrap">
        <div class="color-picker-grid">
          <div class="color-picker-item"><label>背景色</label><input type="color" id="themeBg" value="#fff5f7"></div>
          <div class="color-picker-item"><label>强调色（粉）</label><input type="color" id="themePrimary" value="#ffb0c0"></div>
          <div class="color-picker-item"><label>辅助色（蓝）</label><input type="color" id="themeSecondary" value="#87ceeb"></div>
          <div class="color-picker-item"><label>卡片背景</label><input type="color" id="themeCardBg" value="#ffffff"></div>
          <div class="color-picker-item"><label>文字主色</label><input type="color" id="themeText" value="#2d2d2d"></div>
          <div class="color-picker-item"><label>文字次要</label><input type="color" id="themeTextSecondary" value="#888888"></div>
        </div>

// ===== 服务器同步 =====
const API_BASE = '';
async function syncToServer(type, data) {
  try {
    const res = await fetch(`${API_BASE}/api/data/${type}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });

  } catch (e) {
    // 服务器未运行时静默降级

function showToast(msg, type) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||'success'); t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function formatDate(d) { return d ? new Date(d).toLocaleDateString('zh-CN') : ''; }

// ===== 富文本编辑器通用工厂 =====
let activeEditor = null;

/** 创建一个富文本编辑器（工具栏 + contenteditable） */
function createRichEditor(editorId, placeholder) {
  const wrap = document.createElement('div');
  wrap.className = 'editor-wrap';
  wrap.innerHTML = `
    <div class="editor-toolbar">
      <button type="button" class="ed-btn" data-cmd="bold" title="粗体"><b>B</b></button>
      <button type="button" class="ed-btn" data-cmd="italic" title="斜体"><i>I</i></button>
      <button type="button" class="ed-btn" data-cmd="strikeThrough" title="删除线"><s>S</s></button>
      <span class="ed-divider"></span>
      <button type="button" class="ed-btn" data-cmd="h2" title="二级标题">H2</button>
      <button type="button" class="ed-btn" data-cmd="h3" title="三级标题">H3</button>
      <span class="ed-divider"></span>
      <button type="button" class="ed-btn" data-cmd="insertUnorderedList" title="无序列表">•</button>
      <button type="button" class="ed-btn" data-cmd="insertOrderedList" title="有序列表">1.</button>
      <button type="button" class="ed-btn" data-cmd="blockquote" title="引用">💬</button>
      <span class="ed-divider"></span>
      <button type="button" class="ed-btn" data-cmd="link" title="链接">🔗</button>
      <button type="button" class="ed-btn" data-cmd="image" title="图片">📷</button>
      <button type="button" class="ed-btn" data-cmd="hr" title="分割线">—</button>
      <span class="ed-divider"></span>
      <button type="button" class="ed-btn" data-cmd="inlineCode" title="行内代码">&lt;/&gt;</button>
      <button type="button" class="ed-btn code-btn" data-cmd="codeBlock" title="代码块">▨ 代码块</button>
    </div>
    <div contenteditable="true" class="article-editor" id="${editorId}" data-placeholder="${placeholder || ''}"></div>
  `;
  // 工具栏点击委派
  wrap.querySelector('.editor-toolbar').addEventListener('click', function(e) {
    const btn = e.target.closest('.ed-btn');
    if (!btn) return;
    e.preventDefault();
    const cmd = btn.dataset.cmd;
    const ed = activeEditor || document.getElementById(editorId);
    ed.focus();
    switch (cmd) {
      case 'bold': case 'italic': case 'strikeThrough':
      case 'insertUnorderedList': case 'insertOrderedList':
        document.execCommand(cmd, false, null);
        break;
      case 'h2': document.execCommand('formatBlock', false, 'h2'); break;
      case 'h3': document.execCommand('formatBlock', false, 'h3'); break;
      case 'blockquote': document.execCommand('formatBlock', false, 'blockquote'); break;
      case 'hr': document.execCommand('insertHorizontalRule', false, null); break;
      case 'link': {
        const url = prompt('输入链接 URL:', 'https://');
        if (url) document.execCommand('createLink', false, url);
        break;
      }
      case 'image': {
        const input = document.getElementById('imageFileInput');
        input.value = '';
        input.click();
        break;
      }
      case 'inlineCode': wrapInlineCode(ed); break;
      case 'codeBlock': openCodeModal(ed); break;
    }
  });
  // 焦点跟踪
  const editor = wrap.querySelector('.article-editor');
  editor.addEventListener('focus', () => { activeEditor = editor; });
  return wrap;
}

function wrapInlineCode(editor) {
  editor = editor || activeEditor || document.getElementById('articleContent');
  editor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) {
    const range = sel.getRangeAt(0);
    const code = document.createElement('code');
    code.textContent = 'code';
    range.insertNode(code);
    range.selectNodeContents(code);
    sel.removeAllRanges(); sel.addRange(range);
    return;
  }
  document.execCommand('insertHTML', false, '<code>' + sel.toString() + '</code>');
}

document.getElementById('imageFileInput').addEventListener('change', function(e) {

    this.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = async function(ev) {
    const base64 = ev.target.result;
    const editor = activeEditor || document.getElementById('articleContent');
    editor.focus();
    try {
      const res = await fetch(`${API_BASE}/api/upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

        document.execCommand('insertHTML', false, img);
        showToast('图片已上传到 data/uploads/');
        return;

    } catch {}
    const img = `<img src="${base64}" alt="${file.name}" style="max-width:55%;max-height:260px;float:left;margin:0.5em 1em 0.5em 0;border-radius:8px;object-fit:contain;">`;

    java: 'abstract|assert|boolean|break|byte|case|catch|char|class|const|continue|default|do|double|else|enum|extends|false|final|finally|float|for|goto|if|implements|import|instanceof|int|interface|long|native|new|null|package|private|protected|public|return|short|static|strictfp|super|switch|synchronized|this|throw|throws|transient|true|try|void|volatile|while',

    java: 'int|float|double|char|boolean|void|long|short|byte|String|Integer|Float|Double|Boolean|List|Map|Set|ArrayList|HashMap|Object|Class|Thread',
    go: 'int|int8|int16|int32|int64|uint|float32|float64|bool|string|byte|rune|error|map|chan|struct|interface|slice',

  };
  const builtinSets = {

    typescript: 'console|Math|JSON|Promise|Symbol|Reflect|Proxy|RegExp|Date|Error|parseInt|parseFloat|setTimeout|setInterval|clearTimeout|clearInterval|fetch|ArrayBuffer|Map|Set|WeakMap|WeakSet',
    python: 'print|len|range|int|float|str|list|dict|tuple|set|type|open|input|map|filter|zip|enumerate|sorted|reversed|min|max|sum|abs|round|isinstance|hasattr|getattr|setattr|super|object|property|staticmethod|classmethod|iter|next|all|any|bin|bool|bytearray|bytes|callable|chr|classmethod|compile|complex|delattr|dir|divmod|eval|exec|exit|format|frozenset|globals|hash|help|hex|id|issubclass|iter|locals|memoryview|oct|ord|pow|quit|repr|reversed|round|setattr|slice|sorted|staticmethod|str|sum|super|tuple|type|vars|zip|__import__',

    java: 'System|Math|Arrays|Collections|Objects|StringBuilder|StringBuffer|Pattern|Matcher|Comparator|Comparable|Iterator|Iterable|Scanner|BufferedReader|InputStreamReader|FileReader|FileWriter|BufferedWriter|PrintWriter|FileInputStream|FileOutputStream|ObjectInputStream|ObjectOutputStream|ClassLoader|Runtime|System|Thread|Runnable|Callable|Future|Executor|Executors|ThreadPoolExecutor|ScheduledExecutorService|Optional|Stream|Collectors|Function|Predicate|Consumer|Supplier|BiFunction',

  // 先处理注释和字符串（它们在 HTML 标签里，后面的匹配要跳过标签）
  html = html.replace(/(\/\/[^\n]*)/g, '<span class="hl-cmt">$1</span>');
  html = html.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-cmt">$1</span>');

  function replaceOutsideHTML(re, fn) {
    return html.replace(/(<[^>]*>)|(\b\w+\b)/g, (m, tag, word) => {
      if (tag) return tag; // 保留已有 HTML 不动
      return fn(word);
    });
  }

  if (kw) {
    const words = new Set(kw.split('|'));

  if (types) {
    const words = new Set(types.split('|'));

  }
  html = replaceOutsideHTML(null, w => /^\d+(?:\.\d+)?$/.test(w) ? `<span class="hl-num">${w}</span>` : w);

function updateCodePreview() {
  const ta = document.getElementById('codeInput');
  const code = ta.value;
  const lang = document.getElementById('codeLangSelect').value;
  // 更新行号
  const lines = code.split('\n').length;
  let gutterHtml = '';
  for (let i = 1; i <= lines; i++) gutterHtml += i + '\n';
  document.getElementById('codeGutter').textContent = gutterHtml;
  // 更新高亮
  document.getElementById('codeOverlayContent').innerHTML = highlightCodeText(code, lang);
  // 同步滚动
  document.getElementById('codeOverlay').scrollTop = ta.scrollTop;
}
function insertCodeBlock() {
  const code = document.getElementById('codeInput').value;
  if (!code.trim()) { showToast('请输入代码', 'error'); return; }
  const lang = document.getElementById('codeLangSelect').value;
  const editor = activeEditor || document.getElementById('articleContent');
  editor.focus();
  // 用 pre 标签包装代码块
  const highlighted = highlightCodeText(code, lang);
  const langAttr = lang ? ` data-lang="${lang}"` : '';
  const html = `<pre${langAttr}><code class="language-${lang || 'plaintext'}">${highlighted}</code></pre>`;
  document.execCommand('insertHTML', false, html + '<p><br></p>');
  closeCodeModal();
  showToast('代码块已插入');
}
// 代码输入同步滚动 + 编辑器初始化
document.addEventListener('DOMContentLoaded', () => {
  const codeInput = document.getElementById('codeInput');
  if (codeInput) {
    codeInput.addEventListener('input', updateCodePreview);
    codeInput.addEventListener('scroll', function() {
      document.getElementById('codeOverlay').scrollTop = this.scrollTop;
    });
    // Tab 键插入空格，不跳转焦点
    codeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
        updateCodePreview();
      }
    });
  }
  const langSelect = document.getElementById('codeLangSelect');
  if (langSelect) langSelect.addEventListener('change', updateCodePreview);

  // ===== 初始化所有富文本编辑器 =====

// ===== 数据导出/导入 =====
function exportData() {
  const store = loadStore();
  // 拆成每个数据类型的文件，逐一导出
  const entries = [
    { name: 'articles.json', data: store.articles || [] },
    { name: 'updates.json', data: store.updates || [] },
    { name: 'explores.json', data: store.explores || [] },
    { name: 'music.json', data: store.music || [] },
    { name: 'theme.json', data: store.theme || getDefaultStore().theme },
  ];
  // 打包成一个 ZIP 风格的单一 JSON（浏览器无法直接批量下载文件夹）
  // 改为导出单文件 boke-data.json（兼容后续导入）
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'boke-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('已导出 boke-data.json，请替换到 data/ 目录');
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let store;
      if (Array.isArray(data) && data[0] && data[0].name) {
        // 新格式: [{name, data}, ...]
        store = getDefaultStore();
        data.forEach(item => {
          const key = item.name.replace('.json', '');
          if (key === 'theme') store.theme = item.data;
          else if (Array.isArray(item.data)) store[key] = item.data;
        });
      } else if (data.articles || data.updates) {
        // 兼容旧格式: {articles, updates, ...}
        store = { ...getDefaultStore(), ...data };
      } else {
        showToast('无法识别的数据格式', 'error'); return;
      }
      saveStore(store);
      // 同步到服务器
      ['articles','updates','explores','music','theme'].forEach(k => {
        if (store[k]) syncToServer(k, store[k]);
      });
      showToast('数据已导入并同步到文件！页面即将刷新');
      setTimeout(() => location.reload(), 1000);
    } catch(err) {
      showToast('导入失败: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}
function login() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) { showToast('请输入密码', 'error'); return; }
  if (pw === PASS) { document.getElementById('loginPage').style.display='none'; document.getElementById('adminPage').style.display='block'; loadAll(); }
  else { document.getElementById('loginError').style.display='block'; }
}
function logout() {
  document.getElementById('loginPage').style.display='flex'; document.getElementById('adminPage').style.display='none';
  document.getElementById('passwordInput').value=''; document.getElementById('loginError').style.display='none';
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.admin-nav-item[data-tab]').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(el => el.style.display = el.id === 'tab-'+tab ? 'block' : 'none');
}

// ===== CRUD 工厂（统一增删改查模式） =====
function createCRUD(cfg) {
  let items = [];
  function load() {
    items = store[cfg.key] || [];
    cfg.render(items);
  }
  function edit(id) {
    const item = items.find(x => x.id === id);
    if (!item) return;
    cfg.fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (el) {
        const val = f.get ? f.get(item) : (item[f.prop] || '');
        if (f.set) f.set(el, val);
        else el.value = val;
      }
    });
    document.getElementById(cfg.editId).value = id;
    if (cfg.formTitleId) document.getElementById(cfg.formTitleId).textContent = cfg.editTitle;
    if (cfg.submitBtnId) document.getElementById(cfg.submitBtnId).textContent = cfg.editBtn;
    document.getElementById(cfg.cancelBtnId).style.display = 'inline-block';
    if (cfg.onEdit) cfg.onEdit(item);
  }
  function cancel() {
    cfg.fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (el) {
        if (f.set) f.set(el, '');
        else el.value = '';
      }
    });
    if (cfg.onCancel) cfg.onCancel();
    document.getElementById(cfg.editId).value = '';
    if (cfg.formTitleId) document.getElementById(cfg.formTitleId).textContent = cfg.addTitle;
    if (cfg.submitBtnId) document.getElementById(cfg.submitBtnId).textContent = cfg.addBtn;
    document.getElementById(cfg.cancelBtnId).style.display = 'none';
  }
  function save() {
    const id = document.getElementById(cfg.editId).value;
    const data = cfg.buildData();
    if (id) { const idx = items.findIndex(i => i.id === id); if (idx !== -1) items[idx] = { ...items[idx], ...data }; }
    else { items.unshift({ id: genId(), ...data, createdAt: now() }); }
    store[cfg.key] = items; saveStore(store);
    syncToServer(cfg.key, items);
    showToast(id ? '已更新' : cfg.addedMsg || '已添加');
    cancel(); load();
  }
  function del(id) {
    if (!confirm('确定删除？')) return;
    if (cfg.onDelete) cfg.onDelete(items.find(i => i.id === id));
    items = items.filter(i => i.id !== id);
    store[cfg.key] = items; saveStore(store);
    syncToServer(cfg.key, items);
    showToast('已删除'); load();
  }
  return { load, edit, cancel, save, delete: del, get items() { return items; } };
}

// ===== 文章 CRUD =====
const articles = createCRUD({
  key: 'articles',
  editId: 'articleEditId', formTitleId: 'articleFormTitle', submitBtnId: 'articleSubmitBtn', cancelBtnId: 'articleCancelBtn',
  addTitle: '新增文章', addBtn: '发布文章', addedMsg: '已发布',
  editTitle: '编辑文章', editBtn: '保存修改',
  fields: [
    { id: 'articleTitle', prop: 'title' },
    { id: 'articleTags', prop: 'tags', get: (a) => (a.tags||[]).join(', ') },
    { id: 'articleSummary', prop: 'summary' },
    { id: 'articleContent', prop: 'content', set: (el, v) => { el.innerHTML = v; } },
  ],
  buildData: () => ({
    title: document.getElementById('articleTitle').value.trim()||'无标题',
    tags: document.getElementById('articleTags').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),
    summary: document.getElementById('articleSummary').value.trim(),
    content: document.getElementById('articleContent').innerHTML,
  }),
  render: (items) => {
    const tbody = document.getElementById('articlesTableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="4" class="table-empty">暂无文章</td></tr>'; return; }
    tbody.innerHTML = items.map(a => `<tr>
      <td><strong>${escapeHtml(a.title||'')}</strong></td>
      <td>${(a.tags||[]).map(t => `<span style="display:inline-block;padding:1px 8px;background:rgba(135,206,235,0.15);border-radius:4px;font-size:12px;margin:1px;">${t}</span>`).join('')}</td>
      <td>${formatDate(a.createdAt)}</td>
      <td><button class="btn-sm edit" onclick="articles.edit('${a.id}')">编辑</button><button class="btn-sm del" onclick="articles.delete('${a.id}')">删除</button></td>
    </tr>`).join('');
  },
});

// ===== 主题 =====
const DEFAULT_THEME = { bgColor:'#fff5f7', primaryColor:'#ffb0c0', secondaryColor:'#87ceeb', cardBg:'rgba(255,255,255,0.6)', textColor:'#2d2d2d', textSecondary:'#888888' };
function loadTheme() {
  const t = store.theme || DEFAULT_THEME;
  document.getElementById('themeBg').value = t.bgColor||'#fff5f7';
  document.getElementById('themePrimary').value = t.primaryColor||'#ffb0c0';
  document.getElementById('themeSecondary').value = t.secondaryColor||'#87ceeb';
  document.getElementById('themeCardBg').value = t.cardBg||'#ffffff';
  document.getElementById('themeText').value = t.textColor||'#2d2d2d';
  document.getElementById('themeTextSecondary').value = t.textSecondary||'#888888';
  previewTheme();
}
function previewTheme() {
  const g=id=>document.getElementById(id).value;
  const p=document.getElementById('themePreview');
  p.style.background=g('themeBg');
  const m = {'--text':'themeText','--primary':'themePrimary','--secondary':'themeSecondary','--text-secondary':'themeTextSecondary'};
  Object.keys(m).forEach(v => p.style.setProperty(v, g(m[v])));
}
document.querySelectorAll('#tab-theme input[type="color"]').forEach(el => el.addEventListener('input', previewTheme));
function hexToRgb(h) { return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16); }
function getThemeData() { return { bgColor:document.getElementById('themeBg').value, primaryColor:document.getElementById('themePrimary').value, secondaryColor:document.getElementById('themeSecondary').value, cardBg:'rgba('+hexToRgb(document.getElementById('themeCardBg').value)+',0.6)', textColor:document.getElementById('themeText').value, textSecondary:document.getElementById('themeTextSecondary').value }; }
function saveTheme() { store.theme = getThemeData(); saveStore(store); syncToServer('theme', store.theme); showToast('主题已保存'); }
function resetTheme() { store.theme = {...DEFAULT_THEME}; saveStore(store); loadTheme(); showToast('已重置'); }

function loadAll() {
  try {
    store = loadStore();
    articles.load(); updates.load(); explores.load(); music.load(); loadTheme();
    switchTab('articles');
  } catch(e) { showToast('加载出错: '+e.message, 'error'); }
}
window.onerror = function(msg, url, line) { showToast('页面错误: '+msg+' (行'+line+')', 'error'); return true; };
</script>
