<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bōkè - 个人博客</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="public/css/index.css">
<script>if(localStorage.getItem('boke_theme')==='dark'){document.documentElement.dataset.theme='dark'}</script>
</head>
<body>

<!-- ===== 导航栏（双栏交叉淡入淡出） ===== -->
<nav class="navbar top-nav" id="topNav">
  <button class="nav-item active" data-section="home">🏠 首页</button>
  <button class="nav-item" data-section="articles">📝 文章</button>
  <button class="nav-item" data-section="updates">💬 动态</button>
  <button class="nav-item" data-section="explore">🔍 探索</button>
  <a href="admin.html" class="nav-item" style="text-decoration:none;">⚙️</a>
  <button class="nav-item" id="themeToggleTop" style="font-size:15px;">🌙</button>
  <div class="nav-indicator" id="indicatorTop"></div>
</nav>

<nav class="navbar left-nav" id="leftNav">
  <button class="nav-item active" data-section="home">🏠</button>
  <button class="nav-item" data-section="articles">📝</button>
  <button class="nav-item" data-section="updates">💬</button>
  <button class="nav-item" data-section="explore">🔍</button>
  <a href="admin.html" class="nav-item" style="text-decoration:none;">⚙️</a>
  <button class="nav-item" id="themeToggleLeft" style="font-size:13px;padding:6px 8px;">🌙</button>
  <div class="nav-indicator" id="indicatorLeft"></div>
</nav>

<!-- ===== 首页 ===== -->
<section class="section" id="home">
  <div class="home-three-col">
    <!-- 左栏：最新文章 -->
    <div class="home-col home-col-left fade-up" id="homeArticlesCol">
      <h4>📖 最新文章</h4>
      <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line tiny"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line tiny"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line tiny"></div></div>
    </div>

    <!-- 中栏：搜索 + 时钟 + 音乐 -->
    <div class="home-col home-col-center fade-up">
      <!-- 搜索 -->
      <div class="home-search" id="homeSearch">
        <input type="text" id="globalSearchInput" placeholder="搜索文章、动态..." autocomplete="off">
        <button id="globalSearchBtn">🔍</button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>

      <!-- 时钟 -->
      <div class="hero">
        <div class="clock-frame" id="clockFrame">
          <div class="clock-time" id="clockTime">00:00:00</div>
          <div class="clock-date" id="clockDate">2026年1月1日 星期一</div>
        </div>
      </div>

      <!-- 音乐 -->
      <div class="player-widget" id="playerWidget">
        <div class="player-header">
          <div class="player-cover" id="playerCover">🎵</div>
          <div class="player-info">
            <div class="song-title" id="songTitle">未播放</div>
            <div class="song-artist" id="songArtist">点击播放音乐</div>
          </div>
          <div class="player-controls">
            <button class="player-btn small" id="prevBtn">⏮</button>
            <button class="player-btn" id="playBtn">▶</button>
            <button class="player-btn small" id="nextBtn">⏭</button>
            <div class="player-progress" id="progressWrap">
              <div class="player-progress-bar" id="progressBar"></div>
            </div>
            <span class="player-time" id="timeDisplay">0:00</span>
            <button class="player-btn small" id="listToggleBtn">📋</button>
            <button class="player-btn small mode-btn mode-sequential" id="modeBtn" title="顺序播放">➡️</button>
          </div>
        </div>
        <div class="player-playlist" id="playlist">
          <div style="padding:12px;"><div class="skeleton skeleton-line" style="width:80%;"></div><div class="skeleton skeleton-line tiny" style="width:50%;"></div><div class="skeleton skeleton-line" style="width:70%;"></div></div>
        </div>
      </div>
    </div>

    <!-- 右栏：最新动态 -->
    <div class="home-col home-col-right fade-up" id="homeUpdatesCol">
      <h4>💬 最新动态</h4>
      <div class="skeleton-card"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line tiny"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line tiny"></div></div>
    </div>
  </div>
</section>

<!-- ===== 文章区 ===== -->
<section class="section" id="articles">
  <h2 class="section-title fade-up"><span>📝</span> 文章</h2>
  <div id="articleToolbar"></div>
  <div class="loading-spinner" id="articlesLoading" style="display:none;">加载中...</div>
  <div id="articlesContainer">
    <div class="skeleton-block skeleton"></div>
    <div class="skeleton-grid">
      <div class="skeleton-card skeleton"></div>
      <div class="skeleton-card skeleton"></div>
      <div class="skeleton-card skeleton"></div>
    </div>
  </div>
</section>

<!-- ===== 动态区 ===== -->
<section class="section" id="updates">
  <h2 class="section-title fade-up"><span>💬</span> 动态</h2>
  <div class="updates-list" id="updatesContainer">
    <div style="display:flex;gap:12px;padding:16px;"><div class="skeleton skeleton-avatar"></div><div style="flex:1;"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div></div>
  </div>
</section>

<!-- ===== 探索区 ===== -->
<section class="section" id="explore">
  <h2 class="section-title fade-up"><span>🔍</span> 探索</h2>
  <div class="explore-tabs fade-up" id="exploreTabs">
  </div>
  <div class="explore-grid" id="exploreContainer">
    <div class="skeleton-grid" style="grid-column:1/-1;">
      <div class="skeleton-card skeleton"></div>
      <div class="skeleton-card skeleton"></div>
      <div class="skeleton-card skeleton"></div>
    </div>
  </div>
</section>


<!-- ===== 文章详情弹窗 ===== -->
<div class="article-detail" id="articleDetail">
  <div class="article-detail-overlay" onclick="closeArticle()"></div>
  <div class="article-detail-card">
    <button class="article-detail-close" onclick="closeArticle()">✕</button>
    <div id="articleDetailContent"></div>
  </div>
</div>

<!-- ===== 灯箱 ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<!-- ===== 移动端底部导航栏 ===== -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bottom-nav-item active" data-section="home">🏠<span>首页</span></button>
  <button class="bottom-nav-item" data-section="articles">📝<span>文章</span></button>
  <button class="bottom-nav-item" data-section="updates">💬<span>动态</span></button>
  <button class="bottom-nav-item" data-section="explore">🔍<span>探索</span></button>
  <button class="bottom-nav-item" id="themeToggleBottom">🌙<span>主题</span></button>
  <a class="bottom-nav-item" href="admin.html" style="text-decoration:none;">⚙️<span>管理</span></a>
</nav>

<script src="public/js/shared.js"></script>
<script src="public/js/index-player-config.js"></script>
<script src="public/js/index.js"></script>
</body>
</html>
