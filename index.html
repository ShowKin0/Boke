<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bōkè - 个人博客</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="public/css/index.css">
</head>
<body>

<!-- ===== 导航栏（双栏交叉淡入淡出） ===== -->
<nav class="navbar top-nav" id="topNav">
  <button class="nav-item active" data-section="home">🏠 首页</button>
  <button class="nav-item" data-section="articles">📝 文章</button>
  <button class="nav-item" data-section="updates">💬 动态</button>
  <button class="nav-item" data-section="explore">🔍 探索</button>
  <a href="admin.html" class="nav-item" style="text-decoration:none;">⚙️</a>
  <div class="nav-indicator" id="indicatorTop"></div>
</nav>

<nav class="navbar left-nav" id="leftNav">
  <button class="nav-item active" data-section="home">🏠</button>
  <button class="nav-item" data-section="articles">📝</button>
  <button class="nav-item" data-section="updates">💬</button>
  <button class="nav-item" data-section="explore">🔍</button>
  <a href="admin.html" class="nav-item" style="text-decoration:none;">⚙️</a>
  <div class="nav-indicator" id="indicatorLeft"></div>
</nav>

<!-- ===== 首页 ===== -->
<section class="section" id="home">
  <div class="hero fade-up">
    <div class="clock-frame" id="clockFrame">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">2026年1月1日 星期一</div>
    </div>
  </div>

  <div class="player-widget fade-up" id="playerWidget">
    <div class="player-header">
      <div class="player-cover" id="playerCover">🎵</div>
      <div class="player-info">
        <div class="song-title" id="songTitle">未播放</div>
        <div class="song-artist" id="songArtist">点击播放音乐</div>
      </div>
      <div class="player-controls">
        <button class="player-btn small" id="prevBtn">⏮</button>
        <button class="player-btn" id="playBtn">▶</button>
        <button class="player-btn small" id="nextBtn">⏭</button>
        <div class="player-progress" id="progressWrap">
          <div class="player-progress-bar" id="progressBar"></div>
        </div>
        <span class="player-time" id="timeDisplay">0:00</span>
        <button class="player-btn small" id="listToggleBtn">📋</button>
      </div>
    </div>
    <div class="player-playlist" id="playlist">
      <div class="loading-spinner">加载中...</div>
    </div>
  </div>

  <div class="home-side-cards fade-up" id="homeSideCards">
    <div class="side-column" id="homeArticlesCol">
      <h4>📖 最新文章</h4>
      <div class="loading-spinner" style="padding:20px;">加载中...</div>
    </div>
    <div class="side-column" id="homeUpdatesCol">
      <h4>💬 最新动态</h4>
      <div class="loading-spinner" style="padding:20px;">加载中...</div>
    </div>
  </div>
</section>

<!-- ===== 文章区 ===== -->
<section class="section" id="articles">
  <h2 class="section-title fade-up"><span>📝</span> 文章</h2>
  <div id="articleToolbar"></div>
  <div class="loading-spinner" id="articlesLoading">加载中...</div>
  <div id="articlesContainer"></div>
</section>

<!-- ===== 动态区 ===== -->
<section class="section" id="updates">
  <h2 class="section-title fade-up"><span>💬</span> 动态</h2>
  <div class="updates-list" id="updatesContainer">
    <div class="loading-spinner">加载中...</div>
  </div>
</section>

<!-- ===== 探索区 ===== -->
<section class="section" id="explore">
  <h2 class="section-title fade-up"><span>🔍</span> 探索</h2>
  <div class="explore-tabs fade-up" id="exploreTabs">
    <button class="explore-tab active" data-category="all">全部</button>
  </div>
  <div class="explore-grid" id="exploreContainer">
    <div class="loading-spinner" style="grid-column:1/-1;">加载中...</div>
  </div>
</section>


<!-- ===== 文章详情弹窗 ===== -->
<div class="article-detail" id="articleDetail">
  <div class="article-detail-overlay" onclick="closeArticle()"></div>
  <div class="article-detail-card">
    <button class="article-detail-close" onclick="closeArticle()">✕</button>
    <div id="articleDetailContent"></div>
  </div>
</div>

<!-- ===== 灯箱 ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<script src="public/js/shared.js"></script>
<script src="public/js/index.js"></script>
</body>
</html>
