<h2>🎵 音乐播放器设计</h2>
<p class="subtitle">首页的音乐播放器，你希望它是什么样的？</p>

<div class="options">
  <div class="option" data-choice="simple" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简约内嵌播放器</h3>
      <p>纯CSS自制的迷你播放器，带播放/暂停、切歌、音量、歌曲列表，预置几首轻音乐</p>
    </div>
  </div>
  <div class="option" data-choice="netease" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>网易云音乐外链</h3>
      <p>嵌入网易云音乐的播放器iframe，可以播放你的歌单（需要歌单ID）</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合方案</h3>
      <p>自制播放器作为主体，同时支持添加网易云/QQ音乐等外链歌单</p>
    </div>
  </div>
</div>
