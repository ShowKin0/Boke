<h2>🕐 首页时钟风格</h2>
<p class="subtitle">首页顶部将展示一个时钟，你更喜欢哪种风格？</p>

<div class="cards" style="display: flex; gap: 16px; margin-top: 12px;">
  <div class="card" data-choice="analog" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 48px; margin: 16px 0;">⏰</div>
      <h3>模拟时钟</h3>
      <p style="font-size: 0.85em;">经典表盘 + 时针分针秒针，带平滑动画</p>
    </div>
  </div>
  <div class="card" data-choice="digital" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 48px; margin: 16px 0; font-family: monospace; letter-spacing: 4px;">20:24</div>
      <h3>数字时钟</h3>
      <p style="font-size: 0.85em;">大号数字显示，带日期，简洁现代</p>
    </div>
  </div>
  <div class="card" data-choice="both" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 48px; margin: 16px 0;">⌚</div>
      <h3>两者结合</h3>
      <p style="font-size: 0.85em;">模拟表盘 + 数字时间显示</p>
    </div>
  </div>
</div>
