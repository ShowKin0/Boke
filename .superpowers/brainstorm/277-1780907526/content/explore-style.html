<h2>🔍 探索区 — 杂项收藏</h2>
<p class="subtitle">网站推荐、源码网址、学习视频等，如何分类展示？</p>

<div class="cards" style="display: flex; gap: 16px; margin-top: 12px;">
  <div class="card" data-choice="tabs" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 40px; margin: 12px 0;">📑</div>
      <h3>标签页分类</h3>
      <p style="font-size: 0.85em;">顶部 Tab 切换：网站推荐 / 源码 / 学习视频，每个分类下卡片展示</p>
    </div>
  </div>
  <div class="card" data-choice="grid" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 40px; margin: 12px 0;">🔖</div>
      <h3>标签筛选</h3>
      <p style="font-size: 0.85em;">所有项目混合排列，点击标签筛选（#推荐 #源码 #视频），像小红书</p>
    </div>
  </div>
  <div class="card" data-choice="folders" onclick="toggleSelect(this)" style="flex: 1;">
    <div class="card-body" style="text-align: center;">
      <div style="font-size: 40px; margin: 12px 0;">📂</div>
      <h3>折叠面板</h3>
      <p style="font-size: 0.85em;">每个分类一个可展开/收起的面板，点击展开查看详情</p>
    </div>
  </div>
</div>
